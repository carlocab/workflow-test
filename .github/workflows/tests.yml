name: CI
on: push

defaults:
  run:
    shell: bash -xeuo pipefail {0}

permissions:
  contents: read

jobs:
  test:
    runs-on: macos-15
    env:
      HOMEBREW_DOWNLOAD_CONCURRENCY: auto
    steps:
      - name: Set up Homebrew
        id: set-up-homebrew
        uses: Homebrew/actions/setup-homebrew@main

      - run: brew tap

      - run: brew info --installed --json=v2 | jq '.formulae[] | select(.name == "cmake")'
